{% extends "base.html" %}
{% block title %}Enquiry Received – Light World Engineering{% endblock %}
{% block content %}
<section class="lw-section bg-lw-navy min-vh-100 d-flex align-items-center">
  <div class="container text-center">
    <div class="lw-success-icon mb-4">✅</div>
    <h1 class="lw-section-title">ENQUIRY RECEIVED!</h1>
    <p class="lw-section-desc mx-auto">
      Thank you for reaching out to Light World Engineering. We've received your enquiry and will contact you shortly.
    </p>
    <div class="d-flex flex-wrap justify-content-center gap-3 mt-4">
      <a href="{% url 'core:home' %}" class="btn lw-btn-gold btn-lg px-5">Back to Home</a>
      <a href="tel:{{ COMPANY.phone }}" class="btn lw-btn-outline btn-lg px-5">
        <i class="bi bi-telephone me-2"></i>Call Us Now
      </a>
    </div>
  </div>
</section>
{% endblock %}
